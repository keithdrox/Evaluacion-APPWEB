<!DOCTYPE html>
<html lang="es-EC">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo agropecuario - UTEQ</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>Feria Agropecuaria UTEQ</h1>
  <nav aria-label="Principal">
    <ul>
      <li><a href="#registro">Registrar Producto</a></li>
      <li><a href="#catalogo">Catálogo</a></li>
    </ul>
  </nav>
</header>

<main>
  <section id="registro">
    <h2>Registrar Producto</h2>
    <form id="form-producto" novalidate>
      <div class="form-group">
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" required minlength="3" placeholder="Ej. Manzana Gala">
        <span class="error" id="error-nombre"></span>
      </div>

      <div class="form-group">
        <label for="categoria">Categoría:</label>
        <select id="categoria" name="categoria" required>
          <option value="" disabled selected>Seleccione...</option>
          <option value="frutas">Frutas</option>
          <option value="hortalizas">Hortalizas</option>
          <option value="granos">Granos</option>
          <option value="lácteos">Lácteos</option>
        </select>
        <span class="error" id="error-categoria"></span>
      </div>

      <div class="form-group">
        <label for="precio">Precio ($):</label>
        <input type="number" id="precio" name="precio" required min="0" step="0.01" placeholder="Ej. 1.50">
        <span class="error" id="error-precio"></span>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción:</label>
        <textarea id="descripcion" name="descripcion" placeholder="Opcional..."></textarea>
      </div>

      <button type="submit">Agregar</button>
    </form>
  </section>

  <section id="catalogo">
    <h2>Catálogo de Productos</h2>

    <div class="barra-filtros">
      <div class="campo-buscar">
        <label for="buscar">Buscar:</label>
        <input type="search" id="buscar" placeholder="Escribe el nombre del producto...">
      </div>
      <div class="contador-productos">
        <span>Productos: <strong id="contador">0</strong></span>
      </div>
    </div>

    <div id="galeria" class="galeria-productos">
      <div id="sin-productos" class="sin-productos-msg">
        <p>No hay productos registrados en el catálogo.</p>
      </div>
    </div>
  </section>
</main>

<footer>
  <p>(C) 2026 UTEQ</p>
</footer>

<script src="js/app.js" defer></script>
</body>
</html>
